name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-and-analyze:
    name: Format & Analyze (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Install root dependencies
        run: flutter pub get

      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze root package
        run: flutter analyze --fatal-infos .

      - name: Analyze example app
        run: flutter analyze --fatal-infos .
        working-directory: example

  build-android:
    name: Build Android (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('example/android/**/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build APK (debug)
        run: flutter build apk --debug
        working-directory: example

  build-ios:
    name: Build iOS (${{ matrix.flutter-channel }})
    runs-on: macos-14
    strategy:
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: example/ios/Pods
          key: pods-ios-${{ hashFiles('example/ios/Podfile.lock') }}
          restore-keys: pods-ios-

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign
        working-directory: example

  build-macos:
    name: Build macOS (${{ matrix.flutter-channel }})
    runs-on: macos-14
    strategy:
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: example/macos/Pods
          key: pods-macos-${{ hashFiles('example/macos/Podfile.lock') }}
          restore-keys: pods-macos-

      - name: Build macOS
        run: flutter build macos --debug
        working-directory: example

  build-linux:
    name: Build Linux (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache opencv_dart native build
        uses: actions/cache@v4
        with:
          path: example/.dart_tool/hooks_runner/shared
          key: opencv-native-linux-${{ hashFiles('pubspec.lock', 'example/pubspec.lock') }}
          restore-keys: opencv-native-linux-

      - name: Build Linux
        run: flutter build linux --debug
        working-directory: example

  build-windows:
    name: Build Windows (${{ matrix.flutter-channel }})
    runs-on: windows-latest
    strategy:
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache opencv_dart native build
        uses: actions/cache@v4
        with:
          path: example/.dart_tool/hooks_runner/shared
          key: opencv-native-windows-${{ hashFiles('pubspec.lock', 'example/pubspec.lock') }}
          restore-keys: opencv-native-windows-

      - name: Build Windows
        run: flutter build windows --debug
        working-directory: example
